services:
  - type: web
    name: optivra-image-studio-shopify
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_APP_URL
        value: https://shopify.optivra.app
      - key: SCOPES
        value: read_products,write_products,read_files,write_files
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPTIVRA_API_URL
        sync: false
      - key: OPTIVRA_API_KEY
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
  - type: worker
    name: optivra-image-studio-shopify-worker
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_APP_URL
        value: https://shopify.optivra.app
      - key: SCOPES
        value: read_products,write_products,read_files,write_files
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPTIVRA_API_URL
        sync: false
      - key: OPTIVRA_API_KEY
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
