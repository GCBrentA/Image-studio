services:
  - type: web
    name: optivra-image-studio-shopify
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
  - type: worker
    name: optivra-image-studio-shopify-worker
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 20
